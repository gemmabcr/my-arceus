services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://${DB_HOST:?Set DB_HOST}:${DB_PORT:?Set DB_PORT}/${DB_NAME:?Set DB_NAME}?sslmode=require
      DB_USER: ${DB_USER:?Set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_DRIVER: org.postgresql.Driver
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://my-arceus.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/pokemons"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
